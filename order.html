<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Branding Project Enquiry</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">
    <h2>TRUST US AND OUR BRAND TO ENLIGHTEN YOURS</h2>
    <p>Kindly fill in your details and specify your needs</p>

    <form action="#" method="post">
        
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="full name" required>

        <label for="business">Business / Brand Name</label>
        <input type="text" id="business" name="business" placeholder="company name">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="abc@gmail.com" required>

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+267 71234567">

        <label for="service">Service Needed</label>
        <select id="service" name="service">
            <option value="">Select a service</option>
            <option value="brand-identity">Brand Identity</option>
            <option value="logo-design">Logo Design</option>
            <option value="rebranding">Rebranding</option>
            <option value="brand-strategy">Brand Strategy</option>
            <option value="marketing-design">Marketing Materials</option>
        </select>

        
        <label for="measurements">Measurements</label>
        <input type="text" id="name" name="name" placeholder="2m by 3m" required>

        <label for="material type">Material Type</label>
        <select id="type" name="Type">
            <option value="">Select type</option>
            <option value="brass">Brass</option>
            <option value="Corrugated sheet">Corrugated sheet</option>
            <option value="glass">Glass</option>
            <option value="adhesive">Adhesive</option>
        </select>

        
      


        <label for="budget">Estimated Budget</label>
        <select id="budget" name="budget">
            <option value="">Select budget range</option>
            <option value="low">P500 – P1,000</option>
            <option value="medium">P1,000 – P3,000</option>
            <option value="high">P3,000+</option>
        </select>

        <label for="message">Project Details</label>
        <textarea id="message" name="message" placeholder="Tell us about your brand, goals, and timeline"></textarea>

        <button type="submit">Submit Order</button>
    </form>
</div>

</body>
</html>
