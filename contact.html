<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Footer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f1f3f5;
    }

     header {
        background-color: #0a3d62;
        color: rgb(23, 135, 209);
        padding: 20px;
        text-align: center;
        border-style: solid;
        border-color: #01090f;
     }
  

   

   

     .container {
        display: flex;
        margin: 20px;
    }

     main {
        flex: 3;
        padding: 20px;
        background-color: rgb(2, 46, 79);
        border-radius: 10px;
    }

     aside {
        flex: 1;
        margin-left: 20px;
        padding: 20px;
        background-color: #138f59;
        border-radius: 10px;
    }

 
  </style>
</head>

<body>
  <div id="maincontainer>
    <header>
      <h1>Contact Us</h1> 
    </header>
    <aside>
      <h2>Contact Information</h2>
      <p><strong>Address:</strong> 123 Main Street, City, Country</p>
      <p><strong>Phone:</strong> +1 (555) 123-4567</p>
      <p><strong>Email:</strong>
  </div>

    


 
</body>
</html>
